blur:
{
  method = "dual_kawase";
  strength = 3;
};

blur-background = true;
blur-background-frame = true;
dithered-present = true;

corner-radius = 10;

no-fading-openclose = true;
use-ewmh-active-win = true;
detect-client-opacity = true;
vsync = true;
backend = "glx";

shadow = true;
shadow-radius = 17;
shadow-offset-x = -5;
shadow-offset-y = -5;
shadow-opacity = 0.5;

log-level = "info";

# ────────────────────────────────────────────────────────────────
# Global animations
# Keep global triggers that are not “type-dependent”.
# Open/close are handled via rules below.
# ────────────────────────────────────────────────────────────────
animations = (
  {
    triggers = ["geometry"];
    preset = "geometry-change";
    duration = 0.12;
  }
);

# ────────────────────────────────────────────────────────────────
# Directional spawn by window type (and class)
# Order matters: more specific rules first.
# Adjust terminal WM_CLASS list to match your setup.
# ────────────────────────────────────────────────────────────────
rules = (
  # ── myshittydropdown: slide in from above, slide out upward ──
  {
    match = "class_g = 'myshittydropdown'";
    animations = (
      {
        triggers = ["open", "show"];
        t = {
          curve = "cubic-bezier(0.0, 0.0, 0.2, 1.0)"; # ease-out for snappy drop
          duration = 0.2;
          delay = 0;
          start = 0;
          end = 1;
        };

        # slides in from 60% of its own height above its final position
        offset-x = 0;
        offset-y = "-window-height * 0.6 * (1 - t)";
        shadow-offset-x = 0;
        shadow-offset-y = "-window-height * 0.6 * (1 - t)";

        opacity = "t";
        shadow-opacity = "t";
      },
      {
        triggers = ["close", "hide"];
        t = {
          curve = "cubic-bezier(0.4, 0.0, 1.0, 1.0)"; # ease-in for fast exit
          duration = 0.15;
          delay = 0;
          start = 0;
          end = 1;
        };

        # slides upward as it disappears
        offset-x = 0;
        offset-y = "-window-height * 0.5 * t";
        shadow-offset-x = 0;
        shadow-offset-y = "-window-height * 0.5 * t";

        opacity = "1 - t";
        shadow-opacity = "1 - t";
      }
    );
  },

  # ── Disable shadow on Firefox and Thunderbird ──
  {
    match = "class_g = 'firefox' || class_g = 'thunderbird'";
    shadow = false;
    blur-background = false;
  },

  # ── Electron classless menu popups ──
  {
    match = "window_type = 'menu' && name = ''";
    shadow = false;
    blur-background = false;
  },

  # ── Terminals: micro-zoom + fade (fast, subtle) ──
  {
    match = "window_type = 'normal' && (class_g = 'Alacritty' || class_g = 'kitty' || class_g = 'WezTerm' || class_g = 'URxvt' || class_g = 'XTerm')";
    animations = (
      {
        triggers = ["open"];
        t = {
          curve = "cubic-bezier(0.0, 0.0, 0.2, 1.0)"; # ease-out
          duration = 0.12;
          delay = 0;
          start = 0;
          end = 1;
        };

        # 0.985 -> 1.0
        s = "0.985 + 0.015 * t";

        scale-x = "s";
        scale-y = "s";
        shadow-scale-x = "s";
        shadow-scale-y = "s";

        # keep centered while scaling (picom scales from top-left)
        offset-x = "window-width * (1 - s) / 2";
        offset-y = "window-height * (1 - s) / 2";
        shadow-offset-x = "window-width * (1 - s) / 2";
        shadow-offset-y = "window-height * (1 - s) / 2";

        opacity = "t";
        shadow-opacity = "t";
      },
      {
        triggers = ["close"];
        t = {
          curve = "cubic-bezier(0.4, 0.0, 1.0, 1.0)"; # ease-in
          duration = 0.10;
          delay = 0;
          start = 0;
          end = 1;
        };

        s = "1.0 - 0.02 * t"; # tiny shrink on exit
        scale-x = "s";
        scale-y = "s";
        shadow-scale-x = "s";
        shadow-scale-y = "s";

        offset-x = "window-width * (1 - s) / 2";
        offset-y = "window-height * (1 - s) / 2";
        shadow-offset-x = "window-width * (1 - s) / 2";
        shadow-offset-y = "window-height * (1 - s) / 2";

        opacity = "1 - t";
        shadow-opacity = "1 - t";
      }
    );
  },

  # ── Dialogs: tiny slide-down ~6px + fade ──
  {
    match = "window_type = 'dialog'";
    animations = (
      {
        triggers = ["open"];
        t = {
          curve = "cubic-bezier(0.0, 0.0, 0.2, 1.0)";
          duration = 0.13;
          delay = 0;
          start = 0;
          end = 1;
        };

        # -6px -> 0px (drops into place)
        offset-x = 0;
        offset-y = "-6 * (1 - t)";
        shadow-offset-x = 0;
        shadow-offset-y = "-6 * (1 - t)";

        opacity = "t";
        shadow-opacity = "t";
      },
      {
        triggers = ["close"];
        t = {
          curve = "cubic-bezier(0.4, 0.0, 1.0, 1.0)";
          duration = 0.11;
          delay = 0;
          start = 0;
          end = 1;
        };

        offset-x = 0;
        offset-y = "-4 * t";
        shadow-offset-x = 0;
        shadow-offset-y = "-4 * t";

        opacity = "1 - t";
        shadow-opacity = "1 - t";
      }
    );
  },

  # ── Menus / tooltips: quick fade only (no movement, no scale) ──
  # This includes the common “small UI” window types.
  {
    match = "(window_type = 'tooltip' || window_type = 'menu' || window_type = 'popup_menu' || window_type = 'dropdown_menu' || window_type = 'combo' || window_type = 'utility') && class_g != 'firefox' && class_g != 'thunderbird'";
    opacity = 0.9;
    animations = (
      {
        triggers = ["open", "show"];
        t = {
          curve = "cubic-bezier(0.0, 0.0, 0.2, 1.0)";
          duration = 0.05;
          delay = 0;
          start = 0.7;
          end = 0.9;
        };
        opacity = "t";
        shadow-opacity = "t";
      },
      {
        triggers = ["close", "hide"];
        t = {
          curve = "cubic-bezier(0.4, 0.0, 1.0, 1.0)";
          duration = 0.06;
          delay = 0;
          start = 0.7;
          end = 0.9;
        };
        opacity = "1 - t";
        shadow-opacity = "1 - t";
      }
    );
  },

  # ── Default normal windows: micro-zoom + fade (slightly slower than menus) ──
  {
    match = "window_type = 'normal'";
    animations = (
      {
        triggers = ["open"];
        t = {
          curve = "cubic-bezier(0.0, 0.0, 0.2, 1.0)";
          duration = 0.13;
          delay = 0;
          start = 0;
          end = 1;
        };

        s = "0.99 + 0.01 * t"; # even subtler than terminals
        scale-x = "s";
        scale-y = "s";
        shadow-scale-x = "s";
        shadow-scale-y = "s";

        offset-x = "window-width * (1 - s) / 2";
        offset-y = "window-height * (1 - s) / 2";
        shadow-offset-x = "window-width * (1 - s) / 2";
        shadow-offset-y = "window-height * (1 - s) / 2";

        opacity = "t";
        shadow-opacity = "t";
      },
      {
        triggers = ["close"];
        t = {
          curve = "cubic-bezier(0.4, 0.0, 1.0, 1.0)";
          duration = 0.10;
          delay = 0;
          start = 0;
          end = 1;
        };

        s = "1.0 - 0.015 * t";
        scale-x = "s";
        scale-y = "s";
        shadow-scale-x = "s";
        shadow-scale-y = "s";

        offset-x = "window-width * (1 - s) / 2";
        offset-y = "window-height * (1 - s) / 2";
        shadow-offset-x = "window-width * (1 - s) / 2";
        shadow-offset-y = "window-height * (1 - s) / 2";

        opacity = "1 - t";
        shadow-opacity = "1 - t";
      }
    );
  }
);

