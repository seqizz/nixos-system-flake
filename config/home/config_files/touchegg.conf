<touchégg>
  <settings>
    <property name="animation_delay">150</property>
    <property name="action_execute_threshold">50</property>
    <property name="color">auto</property>
    <property name="borderColor">auto</property>
  </settings>

  <application name="All">
    <!-- 3-finger swipe: switch tags -->
    <gesture type="SWIPE" fingers="3" direction="LEFT">
      <action type="RUN_COMMAND">
        <command>awesome-client 'awful = require("awful"); awful.tag.viewnext()'</command>
        <repeat>false</repeat>
        <on>begin</on>
      </action>
    </gesture>
    <gesture type="SWIPE" fingers="3" direction="RIGHT">
      <action type="RUN_COMMAND">
        <command>awesome-client 'awful = require("awful"); awful.tag.viewprev()'</command>
        <repeat>false</repeat>
        <on>begin</on>
      </action>
    </gesture>

    <!-- 4-finger swipe: switch tags (same action, different finger count) -->
    <gesture type="SWIPE" fingers="4" direction="LEFT">
      <action type="RUN_COMMAND">
        <command>awesome-client 'awful = require("awful"); awful.tag.viewnext()'</command>
        <repeat>false</repeat>
        <on>begin</on>
      </action>
    </gesture>
    <gesture type="SWIPE" fingers="4" direction="RIGHT">
      <action type="RUN_COMMAND">
        <command>awesome-client 'awful = require("awful"); awful.tag.viewprev()'</command>
        <repeat>false</repeat>
        <on>begin</on>
      </action>
    </gesture>
  </application>
</touchégg>
